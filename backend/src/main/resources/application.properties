spring.config.import=optional:file:.env[.properties]
spring.application.name=fsad-project
server.port=${PORT:${SERVER_PORT:8080}}

# Render + Railway production defaults (can still be overridden by env vars)
spring.datasource.url=${DB_URL:jdbc:mysql://switchback.proxy.rlwy.net:56481/railway?useSSL=true&requireSSL=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:${MYSQL_ROOT_PASSWORD:KbTJpnHYfWKCoPHMfkKvzfVRqakqlHsS}}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

# App settings
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://2-2-fsad-frontend.vercel.app,http://localhost:5173}
